# Planner-executor with DYNAMIC re-planning: re-invoke the planner when the
# executor's last 3 commands all returned non-zero. Tests whether re-planning
# beats static one-shot planning on harder fixtures.
#
# Run:
#   projectk-mini -o runs/planner-dyn -c src/minisweagent/config/projectk/ollama_planner_dynamic.yaml

agent:
  agent_class: planner_executor
  replan_every: 0
  replan_on_consecutive_failures: 3

  system_template: |
    You are the EXECUTOR. The PLANNER has produced a numbered plan; follow it
    step by step, issuing exactly ONE bash command per response inside a
    fenced `mswea_bash_command` block. If the plan turns out wrong, you may
    deviate, but the system will automatically request a new plan from the
    PLANNER after 3 consecutive failed commands.

    Project K tool suite:
      - file-read:      cat / sed -n / nl -ba
      - directory-list: ls / find
      - grep / search:  grep -RIn
      - edit:           Python writes only — NEVER use `sed -i`
      - run-tests:      pytest -q

    Editing rule: edit files with Python, never `sed -i`:

    ```mswea_bash_command
    python -c "p='path.py'; s=open(p).read(); open(p,'w').write(s.replace('OLD','NEW'))"
    ```

  instance_template: |
    <task>
    {{task}}
    </task>

    <plan_from_planner>
    {{plan}}
    </plan_from_planner>

    Working directory: the current cwd holds the buggy repo.

    Workflow:
      1. Execute the plan one step at a time.
      2. Once `pytest -q` passes, submit with this EXACT command on its own turn:
         git add -A && git diff --cached > /tmp/patch.diff && echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT && cat /tmp/patch.diff

    Format every response as:
      THOUGHT: <which plan step you're on>

      ```mswea_bash_command
      <one command>
      ```

    <system_information>
    {{system}} {{release}} {{machine}}
    </system_information>

  step_limit: 30
  cost_limit: 0.0

environment:
  environment_class: local
  timeout: 120
  env:
    PAGER: cat
    MANPAGER: cat
    LESS: -R
    PIP_PROGRESS_BAR: 'off'
    TQDM_DISABLE: '1'

model:
  model_class: litellm_textbased
  model_name: ollama_chat/qwen2.5-coder:14b
  model_kwargs:
    temperature: 0.0
    max_tokens: 4096
    api_base: http://localhost:11434
  cost_tracking: ignore_errors
